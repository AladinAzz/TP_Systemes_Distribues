<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP3 Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header class="topbar">
    <h1>POP3 Mailbox</h1>
    <div class="top-actions">
        <a class="btn" href="/">Home</a>
        <a class="btn" href="/imap">IMAP</a>
        <a class="btn" href="/compose">Compose</a>
        <button id="themeToggle" class="theme-toggle" type="button">Toggle Theme</button>
    </div>
</header>

<main class="container">
    <section class="card">
        <h2>Service Status</h2>
        <div class="service-grid">
            <div class="service-item">
                <span>SMTP</span>
                <span class="status-pill"
                      th:classappend="${serviceStates['smtp'] == 'RUNNING'} ? ' status-running' : (${serviceStates['smtp'] == 'STOPPED'} ? ' status-stopped' : ' status-unreachable')"
                      th:text="${serviceStates['smtp']}">UNKNOWN</span>
            </div>
            <div class="service-item">
                <span>POP3</span>
                <span class="status-pill"
                      th:classappend="${serviceStates['pop3'] == 'RUNNING'} ? ' status-running' : (${serviceStates['pop3'] == 'STOPPED'} ? ' status-stopped' : ' status-unreachable')"
                      th:text="${serviceStates['pop3']}">UNKNOWN</span>
            </div>
            <div class="service-item">
                <span>IMAP</span>
                <span class="status-pill"
                      th:classappend="${serviceStates['imap'] == 'RUNNING'} ? ' status-running' : (${serviceStates['imap'] == 'STOPPED'} ? ' status-stopped' : ' status-unreachable')"
                      th:text="${serviceStates['imap']}">UNKNOWN</span>
            </div>
        </div>
    </section>

    <section class="card">
        <h2>POP3 Mailbox - <span th:text="${username}"></span></h2>
        <div class="tabs">
            <a class="tab-link"
               th:classappend="${activeTab == 'received'} ? ' active'"
               href="/pop3">Received</a>
            <a class="tab-link"
               th:classappend="${activeTab == 'sent'} ? ' active'"
               href="/pop3/sent">Sent</a>
        </div>
        <table class="mail-table">
            <thead>
            <tr>
                <th>ID</th>
                <th th:text="${activeTab == 'sent'} ? 'To' : 'From'">From</th>
                <th>Subject</th>
                <th>Type</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(messages)}">
                <td colspan="5">No messages.</td>
            </tr>
            <tr th:each="mail : ${messages}">
                <td th:text="${mail['id']}"></td>
                <td th:text="${activeTab == 'sent' ? mail['recipient'] : mail['sender']}"></td>
                <td th:text="${mail['subject']}"></td>
                <td th:text="${mail['emailType']}"></td>
                <td><a class="btn small" th:href="@{|/pop3/message/${mail['id']}|}">View</a></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<script src="/js/theme.js"></script>
</body>
</html>
